<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>SeSac | 마이페이지</title>
    <link th:href="@{/css/bootstrap.css}" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="app-body">
<div th:replace="~{fragments/layout :: siteHeader('mypage')}"></div>

<main class="page-shell">
    <section class="page-hero" data-reveal="1">
        <span class="page-eyebrow">My Profile</span>
        <h1 class="page-title">마이페이지</h1>
        <p class="page-summary">
            계정 정보와 관심 정책, 현재 참여 중인 모임을 한 번에 관리할 수 있습니다.
        </p>
        <div class="hero-metrics">
            <div class="metric-chip">
                <strong th:text="${name}"></strong>
                <span>이름</span>
            </div>
            <div class="metric-chip">
                <strong th:text="${level}"></strong>
                <span>현재 등급</span>
            </div>
            <div class="metric-chip">
                <strong th:text="${chooseRole == 0 ? '복지' : (chooseRole == 1 ? '취업' : '모두')}"></strong>
                <span>관심 정책</span>
            </div>
        </div>
    </section>

    <section class="section-grid">
        <article class="surface-card" data-reveal="2">
            <div class="surface-card__header">
                <div>
                    <h2 class="surface-card__title">회원 정보 수정</h2>
                    <p class="surface-card__subtitle">변경 가능한 값만 수정한 뒤 저장하세요.</p>
                </div>
            </div>

            <form th:action="@{/mypage/update}" method="post" class="create-form">
                <div class="field-grid">
                    <div class="field-group">
                        <label for="name">이름</label>
                        <input type="text" class="text-input" id="name" name="name" th:value="${name}" readonly>
                    </div>
                    <div class="field-group">
                        <label for="level">등급</label>
                        <input type="text" class="text-input" id="level" name="level" th:value="${level}" readonly>
                    </div>
                    <div class="field-group">
                        <label for="loginId">로그인 ID</label>
                        <input type="text" class="text-input" id="loginId" name="loginId" th:value="${loginId}" readonly>
                    </div>
                    <div class="field-group">
                        <label for="loginPassword">비밀번호 변경</label>
                        <input type="password" class="text-input" id="loginPassword" name="loginPassword" placeholder="변경할 때만 새 비밀번호 입력">
                    </div>
                    <div class="field-group">
                        <label for="chooseRole">정책 선택 유형</label>
                        <select class="select-input" id="chooseRole" name="chooseRole" required>
                            <option value="care" th:selected="${chooseRole == 0}">복지 정보</option>
                            <option value="job" th:selected="${chooseRole == 1}">취업 정보</option>
                            <option value="all" th:selected="${chooseRole == 2}">모두</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>참여 모임</label>
                        <a th:href="@{/board/content/{id}(id=${boardId})}"
                           class="action-button"
                           th:text="${boardId == 0 ? '참여 중인 모임이 없습니다.' : #strings.abbreviate(boardTitle, 20)}"
                           th:onclick="${boardId == 0} ? 'return false;' : ''"></a>
                    </div>
                </div>

                <div class="page-actions">
                    <button type="submit" class="action-button action-button--primary">정보 저장</button>
                </div>
            </form>
        </article>
    </section>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
