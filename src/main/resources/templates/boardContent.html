<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>SeSac | 모임 상세</title>
    <link th:href="@{/css/bootstrap.css}" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="app-body">
<div th:replace="~{fragments/layout :: siteHeader('board')}"></div>

<main class="page-shell">
    <section class="page-hero" data-reveal="1">
        <span class="page-eyebrow">Meetup Detail</span>
        <h1 class="page-title" th:text="${board.title}"></h1>
        <p class="page-summary">
            작성자 <strong th:text="${board.author}"></strong> 님이 만든 모임입니다.
            참여 전 상세 내용과 현재 인원을 확인해 보세요.
        </p>
        <div class="hero-metrics">
            <div class="metric-chip">
                <strong th:text="${board.agent} + ' / ' + ${board.total}"></strong>
                <span>현재 참가 인원</span>
            </div>
            <div class="metric-chip">
                <strong th:text="${board.author}"></strong>
                <span>작성자</span>
            </div>
        </div>
    </section>

    <section class="detail-grid">
        <article class="surface-card" data-reveal="2">
            <div class="surface-card__header">
                <div>
                    <h2 class="surface-card__title">모임 소개</h2>
                    <p class="surface-card__subtitle">내용을 읽고 참여 여부를 결정할 수 있습니다.</p>
                </div>
            </div>
            <div class="content-block" th:text="${board.content}"></div>

            <div class="page-actions page-actions--spaced">
                <a th:href="@{/board/delete/{id}(id=${board.id})}"
                   class="action-button action-button--danger"
                   th:if="${(loginId == board.author) && !board.deadlineScheduled}">삭제</a>

                <a th:href="@{/board/deadline/{id}(id=${board.id})}"
                   class="action-button action-button--secondary"
                   th:if="${(loginId == board.author) && !board.deadlineScheduled}">모집 마감하기</a>

                <a th:href="@{/board/join/{id}(id=${board.id})}"
                   class="action-button action-button--primary"
                   th:if="${(loginId != board.author) && !#lists.contains(checkDuplicateAgentList, loginId) && !board.agentFull}">참여하기</a>

                <a th:href="@{/board/disconnect/{id}(id=${board.id})}"
                   class="action-button"
                   th:if="${(loginId != board.author) && #lists.contains(checkDuplicateAgentList, loginId) && !board.agentFull}">모임 나가기</a>

                <span class="table-badge"
                      th:if="${board.deadlineScheduled}">마감 예약됨</span>

                <a href="/board/1" class="action-button">목록으로 돌아가기</a>
            </div>
        </article>

        <aside class="surface-card surface-card--accent participant-panel" data-reveal="3">
            <div>
                <h2 class="surface-card__title">참여자 목록</h2>
                <p class="surface-card__subtitle">현재 이 모임에 포함된 계정입니다.</p>
            </div>

            <div class="participant-list">
                <div class="participant-list__item" th:each="list : ${agentList}" th:text="${list.agent}"></div>
            </div>
        </aside>
    </section>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>

<script th:src="@{/js/app.js}"></script>
<div th:replace="~{fragments/layout :: alertMessage(${errorMessage})}"></div>
</body>
</html>
