<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>SeSac | 글쓰기</title>
    <link th:href="@{/css/bootstrap.css}" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="app-body">
<div th:replace="~{fragments/layout :: siteHeader('board')}"></div>

<main class="page-shell">
    <section class="page-hero" data-reveal="1">
        <span class="page-eyebrow">Create Meetup</span>
        <h1 class="page-title">새 모임 만들기</h1>
        <p class="page-summary">
            부담 없는 규모와 분명한 목적을 적어 주세요. 짧고 선명한 모임일수록 참여가 쉽습니다.
        </p>
        <div class="hero-actions">
            <span class="readonly-pill" th:text="'작성자: ' + ${author}"></span>
        </div>
    </section>

    <section class="section-grid">
        <article class="surface-card" data-reveal="2">
            <form th:action="@{/board/create}" method="post" th:object="${boardDto}" class="create-form">
                <div class="field-grid">
                    <div class="field-group">
                        <label for="title">제목</label>
                        <input type="text" id="title" class="text-input" th:field="*{title}" placeholder="예: 선릉 근처 산책하실 분" required>
                    </div>
                    <div class="field-group">
                        <label for="total">최대 인원</label>
                        <input type="number" id="total" class="text-input" th:field="*{total}" placeholder="2~10명" min="2" max="10" required>
                        <span class="field-hint">너무 큰 규모보다 2~5명 정도가 대화형 모임에 적합합니다.</span>
                    </div>
                </div>

                <div class="field-grid field-grid--single">
                    <div class="field-group">
                        <label for="content">본문</label>
                        <textarea id="content" class="textarea-input" th:field="*{content}" placeholder="장소, 시간, 무엇을 함께 할지 간단히 적어 주세요." required></textarea>
                    </div>
                </div>

                <input type="hidden" id="author" name="author" th:value="${author}">

                <div class="page-actions">
                    <button type="submit" class="action-button action-button--primary">게시글 등록</button>
                    <a href="/board/1" class="action-button">취소</a>
                </div>
            </form>
        </article>
    </section>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
